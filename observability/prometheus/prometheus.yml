# Prometheus for Causa. Metrics arrive from the OTel Collector via remote write
# and from mesh scrape targets (Consul, service graph).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: consul
    metrics_path: /v1/agent/metrics
    params:
      format: [prometheus]
    static_configs:
      - targets: ['consul:8500']
    relabel_configs:
      - target_label: instance
        replacement: consul

  - job_name: servicegraph
    metrics_path: /metrics
    static_configs:
      - targets: ['otel-collector:8889']
    relabel_configs:
      - target_label: instance
        replacement: otel-collector-servicegraph
