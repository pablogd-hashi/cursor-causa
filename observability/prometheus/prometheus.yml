# Prometheus for Causa. Metrics arrive from the OTel Collector via remote write
# (the Collector pushes; Prometheus needs --web.enable-remote-write-receiver,
# set in docker-compose.yml). Alerting rules are evaluated here and routed to
# Alertmanager.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
