# OpenTelemetry Collector for Causa. Unified OTLP (payments) + Zipkin (mesh)
# pipelines fan out to Jaeger, Prometheus (remote write + service graph), and Loki.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  zipkin:
    endpoint: 0.0.0.0:9411

processors:
  memory_limiter:
    check_interval: 2s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 1024

  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

  # Keep all errors, all charges slower than 1s, and a 5% baseline.
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 50
    policies:
      - name: keep-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: keep-slow
        type: latency
        latency:
          threshold_ms: 1000
      - name: baseline
        type: probabilistic
        probabilistic:
          sampling_percentage: 5

  # fake-service Zipkin spans omit kind=CLIENT; servicegraph ignores them unless
  # we fix the kind and peer.service for call_upstream spans.
  transform/fix_client_spans:
    trace_statements:
      - context: span
        statements:
          - set(kind, SPAN_KIND_CLIENT) where name == "call_upstream"
          - set(attributes["peer.service"], attributes["http.url"]) where name == "call_upstream" and attributes["http.url"] != nil
          - replace_pattern(attributes["peer.service"], "^https?://([^:/]+).*$$", "$$1") where attributes["peer.service"] != nil and name == "call_upstream"

  filter/client_only:
    error_mode: ignore
    traces:
      span:
        - 'kind != SPAN_KIND_CLIENT'

  attributes/mesh:
    actions:
      - key: mesh
        value: consul
        action: insert
      - key: datacenter
        value: dc1
        action: insert

connectors:
  servicegraph:
    latency_histogram_buckets: [1ms, 2ms, 6ms, 10ms, 100ms, 250ms, 500ms, 1000ms]
    dimensions: []
    store:
      ttl: 10s
      max_items: 1000
    cache_loop: 1s
    virtual_node_peer_attributes: ["peer.service"]

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Service graph metrics: traces_service_graph_request_total on :8889
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: ""

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces/otlp:
      receivers: [otlp]
      processors: [memory_limiter, resource, tail_sampling, batch]
      exporters: [otlp/jaeger, servicegraph]

    traces/zipkin:
      receivers: [zipkin]
      processors: [memory_limiter, transform/fix_client_spans, attributes/mesh, batch]
      exporters: [otlp/jaeger]

    traces/zipkin_graph:
      receivers: [zipkin]
      processors: [memory_limiter, transform/fix_client_spans, filter/client_only, batch]
      exporters: [servicegraph]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite]

    metrics/servicegraph:
      receivers: [servicegraph]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki]
