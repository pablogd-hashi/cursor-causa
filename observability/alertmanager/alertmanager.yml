# Alertmanager routes every firing alert to Causa's webhook. The URL uses
# host.docker.internal so it reaches causa-api whether it runs locally
# (./run-local.sh / ./demo.sh on the host) or in compose (it publishes :8000).
# host.docker.internal works on Docker Desktop (macOS/Windows); on Linux add
#   extra_hosts: ["host.docker.internal:host-gateway"]
# to the alertmanager service in docker-compose.yml.
#
# A shared-secret Bearer can be added here once CAUSA_WEBHOOK_SECRET is set; the
# API verifies it. Alertmanager does not interpolate env vars in this file, so
# the token would be written literally if used.

route:
  receiver: causa
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: causa
    webhook_configs:
      - url: http://host.docker.internal:8000/webhook/alert
        send_resolved: true
