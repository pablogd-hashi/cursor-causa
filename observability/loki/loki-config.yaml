# Single-binary Loki, filesystem storage. Lifted from the reference repo; sized
# for a local demo, not production retention. The OTLP receiver lives at /otlp on
# the HTTP port; the Collector pushes logs there and Loki promotes service.name /
# service.namespace to indexed labels.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  reject_old_samples: false
  retention_period: 168h

analytics:
  reporting_enabled: false
