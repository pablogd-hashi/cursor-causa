# Declared service dependency graph for the Causa prototype.
#
# This is the data behind blast-radius reasoning: "rolling back payments breaks
# checkout, refunds, invoice and ledger -> recommend a staged rollout". It is a
# *declared* graph on purpose. In production this same shape would come from a
# Consul MCP TopologySource; the prototype reads this file instead. The seam
# (causa TopologySource interface, added in Phase 2) means swapping to Consul
# does not touch the engine.
#
# `depends_on` reads "calls / depends on the named upstream". So payments is the
# upstream that everything else relies on; rolling it back affects every service
# that lists it (directly or transitively) in depends_on.

services:
  payments:
    depends_on: []            # the upstream service the incident is about
  checkout:
    depends_on: [payments]
  refunds:
    depends_on: [payments]
  invoice:
    depends_on: [payments]
  ledger:
    depends_on: [payments, refunds]
